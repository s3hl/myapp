<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ごまちゃんアプリのダウンロード</title>
</head>

<body style="font-family: sans-serif; text-align: center; padding: 20px; background-color: #f7f7f7;">

  <h2 style="font-size: 26px; margin-bottom: 10px; color: #333;">
    ごまちゃんアプリのダウンロード
  </h2>

  <p style="font-size: 16px; color: #555; margin-bottom: 20px;">
    下のボタンを押すとアプリをダウンロードできます。
  </p>

  <!-- 更新日は手書きでOK -->
  <p style="font-size: 14px; color: #777; margin-bottom: 30px;">
    更新日：2025-05-15
  </p>

  <a href="aprfile-s.apk" download
     style="
       display: inline-block;
       background-color: #4CAF50;
       color: white;
       padding: 14px 28px;
       font-size: 18px;
       border-radius: 10px;
       text-decoration: none;
       box-shadow: 0 4px 8px rgba(0,0,0,0.2);
     ">
    ダウンロード
  </a>

  <!-- ★ Gmail WebView 対策：close() + back() の併用 ★ -->
  <button onclick="window.close(); window.history.back();"
          style="
            display: block;
            margin: 40px auto 0;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            background-color: #888;
            color: white;
          ">
    終了する
  </button>

</body>
</html>
